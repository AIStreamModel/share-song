<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTV</title>
    <style>
        :root { --bg: #0f0f13; --panel: #1c1c21; --primary: #00e5ff; --text: #eee; --gray: #888; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 15px; }
        
        input, button { padding: 12px; border-radius: 10px; border: none; font-size: 16px; outline: none; }
        input { background: var(--panel); color: var(--text); border: 1px solid #333; }
        input:focus { border-color: var(--primary); }
        button { cursor: pointer; font-weight: bold; transition: 0.2s; background: #333; color: #fff; }
        button:hover { filter: brightness(1.2); }
        .btn-primary { background: var(--primary); color: #000; }

        /* 大廳 */
        #lobby { display: none; flex-direction: column; gap: 10px; margin-top: 20vh; text-align: center; }
        
        /* 包廂 */
        #main { display: none; flex-direction: column; gap: 15px; }
        .flex-row { display: flex; gap: 10px; }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; background: var(--panel); padding: 10px 15px; border-radius: 10px; }
        #room-id-txt { font-weight: bold; letter-spacing: 1px; }
        
        #nickname { width: 80px; }
        #yt-link { flex: 1; }
        
        .player-wrapper { position: relative; padding-bottom: 56.25%; background: #000; border-radius: 10px; overflow: hidden; }
        .player-wrapper iframe { position: absolute; width: 100%; height: 100%; }
        
        #force-play { background: #4CAF50; width: 100%; display: none; }
        
        ul { list-style: none; padding: 0; margin: 0; background: var(--panel); border-radius: 10px; overflow: hidden; }
        li { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2a2a; }
        li.playing { color: var(--primary); font-weight: bold; background: rgba(0, 229, 255, 0.05); }
        .song-info { display: flex; align-items: center; gap: 10px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .tag { font-size: 12px; background: #333; padding: 2px 8px; border-radius: 10px; color: #ccc; }
        .playing .tag { background: var(--primary); color: #000; }
        .del-btn { background: transparent; color: #ff4444; padding: 5px 10px; }

        #toast { position: fixed; bottom: -50px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 10px 20px; border-radius: 20px; transition: 0.3s; opacity: 0; font-weight: bold; }
        #toast.show { bottom: 20px; opacity: 1; }
    </style>
</head>
<body>

<div class="container">
    <div id="lobby">
        <input type="text" id="room-input" placeholder="Room ID">
        <button id="enter-btn" class="btn-primary">Enter</button>
    </div>

    <div id="main">
        <div class="header-bar">
            <span id="room-id-txt"></span>
            <button onclick="copyLink()">Copy Link</button>
        </div>

        <div class="flex-row">
            <input type="text" id="nickname" placeholder="Name">
            <input type="text" id="yt-link" placeholder="YouTube URL">
            <button id="add-btn" class="btn-primary">+</button>
        </div>

        <button id="force-play">▶ Play</button>

        <div class="player-wrapper"><div id="player"></div></div>
        
        <div style="text-align: right;">
            <button id="skip-btn">⏭ Skip</button>
        </div>

        <ul id="playlist"></ul>
    </div>
</div>

<div id="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const app = initializeApp({
      apiKey: "AIzaSyAFYLj9wdQWuKtTmGdhO1trjUNRCSHNe3I",
      authDomain: "karaoke-fcaef.firebaseapp.com",
      databaseURL: "https://karaoke-fcaef-default-rtdb.firebaseio.com",
      projectId: "karaoke-fcaef"
    });
    const db = getDatabase(app);

    // --- 狀態管理 (State) ---
    const state = {
        queue: [],
        currentKey: null,
        isPlayerReady: false
    };

    let player;
    let queueRef;
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('room');

    const toast = (msg) => {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.classList.add("show");
        setTimeout(() => el.classList.remove("show"), 2000);
    };

    window.copyLink = () => {
        navigator.clipboard.writeText(window.location.href);
        toast("Copied");
    };

    // --- Rerender 畫面渲染邏輯 ---
    function render() {
        const list = document.getElementById('playlist');
        list.innerHTML = ''; 

        if (state.queue.length === 0) {
            list.innerHTML = '<li style="color:#888; justify-content:center;">Empty</li>';
            if(state.isPlayerReady) document.getElementById('force-play').style.display = 'block';
            return;
        }

        state.queue.forEach((song, i) => {
            const li = document.createElement('li');
            const isPlaying = i === 0;
            if (isPlaying) li.className = 'playing';
            
            li.innerHTML = `
                <div class="song-info">
                    <span>${isPlaying ? '▶' : i + '.'} ${song.title}</span>
                    <span class="tag">${song.nickname}</span>
                </div>
                <button class="del-btn" data-key="${song.key}">×</button>
            `;
            list.appendChild(li);
        });

        // 綁定刪除按鈕事件 (事件代理概念)
        document.querySelectorAll('.del-btn').forEach(btn => {
            btn.onclick = (e) => remove(ref(db, `rooms/${roomId}/queue/${e.target.dataset.key}`));
        });

        checkPlayer();
    }

    // --- 播放器邏輯 ---
    function checkPlayer() {
        if (!state.isPlayerReady) return;
        
        if (state.queue.length > 0) {
            const nextKey = state.queue[0].key;
            if (state.currentKey !== nextKey) {
                state.currentKey = nextKey;
                player.loadVideoById(state.queue[0].videoId);
            }
        } else {
            if (player.stopVideo) player.stopVideo();
            state.currentKey = null;
        }
    }

    // --- 路由與初始化 ---
    if (!roomId) {
        document.getElementById('lobby').style.display = 'flex';
        document.getElementById('enter-btn').onclick = () => {
            const val = document.getElementById('room-input').value.trim();
            if (val) window.location.href = `?room=${val}`;
        };
    } else {
        document.getElementById('main').style.display = 'flex';
        document.getElementById('room-id-txt').textContent = `ROOM: ${roomId}`;
        queueRef = ref(db, `rooms/${roomId}/queue`);

        // 監聽資料庫變化 -> 更新 state -> 觸發 render
        onValue(queueRef, (snapshot) => {
            const songs = [];
            snapshot.forEach(child => songs.push({ key: child.key, ...child.val() }));
            state.queue = songs.sort((a, b) => a.timestamp - b.timestamp);
            render();
        });

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        window.onYouTubeIframeAPIReady = () => {
            player = new YT.Player('player', {
                height: '100%', width: '100%',
                playerVars: { 'autoplay': 1, 'controls': 1, 'playsinline': 1 },
                events: {
                    'onReady': () => { state.isPlayerReady = true; render(); },
                    'onStateChange': (e) => {
                        if (e.data === 0 && state.currentKey) remove(ref(db, `rooms/${roomId}/queue/${state.currentKey}`));
                        if (e.data === 1) document.getElementById('force-play').style.display = 'none';
                    }
                }
            });
        };
    }

    // --- UI 互動 ---
    const getId = url => (url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([^&?]+)/) || [])[1];

    document.getElementById('add-btn').onclick = () => {
        const url = document.getElementById('yt-link').value;
        const name = document.getElementById('nickname').value.trim() || "Anon";
        const vid = getId(url);
        
        if (vid) {
            fetch(`https://noembed.com/embed?dataType=json&url=https://www.youtube.com/watch?v=${vid}`)
                .then(r => r.json())
                .then(d => push(queueRef, { videoId: vid, title: d.title || "Unknown", nickname: name, timestamp: Date.now() }))
                .catch(() => push(queueRef, { videoId: vid, title: vid, nickname: name, timestamp: Date.now() }));
            document.getElementById('yt-link').value = '';
            toast("Added");
        }
    };

    document.getElementById('skip-btn').onclick = () => {
        if (state.currentKey) remove(ref(db, `rooms/${roomId}/queue/${state.currentKey}`));
    };

    document.getElementById('force-play').onclick = () => {
        if (player && player.playVideo) {
            player.playVideo();
            document.getElementById('force-play').style.display = 'none';
        }
    };
</script>
</body>
</html>
