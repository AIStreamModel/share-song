<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Song</title>

    <style>
        :root {
            --bg: #050505;
            --card: rgba(255, 255, 255, 0.06);
            --card-hover: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.12);
            --text: #f5f5f5;
            --gray: #8b8b8b;
            --primary: #00e5ff;
            --primary-glow: rgba(0, 229, 255, 0.45);
            --accent: #ff2a5f;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100%;
            background:
                radial-gradient(circle at top left, rgba(0, 229, 255, 0.12), transparent 32%),
                radial-gradient(circle at bottom right, rgba(255, 42, 95, 0.12), transparent 35%),
                var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
        }

        body {
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        button,
        input {
            font-family: inherit;
        }

        button {
            cursor: pointer;
            border: none;
            outline: none;
            transition: 0.2s ease;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 14px;
            outline: none;
            transition: 0.2s ease;
        }

        input::placeholder {
            color: var(--gray);
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.12);
        }

        .glass-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
        }

        .btn-primary {
            background: linear-gradient(135deg, #00e5ff, #00ff88);
            color: #000;
            font-weight: 700;
            border-radius: 12px;
            padding: 12px 16px;
            box-shadow: 0 8px 20px rgba(0, 255, 136, 0.18);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 26px rgba(0, 255, 136, 0.28);
        }

        #lobby {
            width: min(420px, calc(100vw - 40px));
            min-height: 300px;
            margin: 12vh auto 0;
            padding: 32px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            text-align: center;
        }

        #lobby h1 {
            margin: 0;
            font-size: 34px;
            letter-spacing: 1px;
            color: var(--text);
            text-shadow: 0 0 18px rgba(0, 229, 255, 0.25);
        }

        .room-input-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #main {
            width: min(1280px, 100%);
            margin: 0 auto;
            display: none;
            flex-direction: column;
            gap: 20px;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            flex-shrink: 0;
        }

        #room-id-txt {
            font-weight: bold;
            letter-spacing: 1px;
            color: var(--primary);
            font-size: 18px;
            text-shadow: 0 0 8px var(--primary-glow);
        }

        .copy-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 8px 16px;
            font-size: 13px;
            color: var(--text);
            border-radius: 8px;
        }

        .copy-btn:hover {
            background: var(--card-hover);
            border-color: var(--primary);
            color: var(--primary);
        }

        .content-body {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .player-section {
            flex: 1.5;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        #yt-link {
            flex: 1;
            min-width: 0;
        }

        #add-btn {
            flex-shrink: 0;
            width: 100px;
        }

        .player-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #222;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.6);
        }

        .player-wrapper iframe {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            border: none;
        }

        #player {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            background: #000;
        }

        #force-play {
            background: linear-gradient(135deg, #00e5ff, #00ff88);
            color: #000;
            width: 100%;
            display: none;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
            padding: 12px 16px;
            font-weight: bold;
            border-radius: 14px;
        }

        .controls-row {
            display: flex;
            justify-content: flex-end;
        }

        #skip-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 10px 20px;
            font-size: 14px;
            color: var(--text);
            border-radius: 12px;
        }

        #skip-btn:hover {
            background: rgba(255, 42, 95, 0.1);
            border-color: var(--accent);
            color: var(--accent);
        }

        .queue-section {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 120px);
            position: sticky;
            top: 20px;
            overflow: hidden;
        }

        .queue-title {
            padding: 18px 20px;
            margin: 0;
            font-size: 16px;
            font-weight: bold;
            color: var(--text);
            border-bottom: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.2);
            letter-spacing: 1px;
            flex-shrink: 0;
        }

        ul#playlist {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        ul#playlist::-webkit-scrollbar {
            width: 6px;
        }

        ul#playlist::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
        }

        ul#playlist::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
        }

        ul#playlist::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        li {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            transition: 0.2s;
            gap: 10px;
        }

        li:last-child {
            border-bottom: none;
        }

        li.playing {
            background: rgba(0, 229, 255, 0.05);
            border-left: 4px solid var(--primary);
            padding-left: 16px;
        }

        li.playing .song-title {
            color: var(--primary);
            font-weight: bold;
            text-shadow: 0 0 8px var(--primary-glow);
        }

        .song-info {
            display: flex;
            align-items: center;
            gap: 12px;
            overflow: hidden;
            min-width: 0;
        }

        .song-index {
            min-width: 25px;
            text-align: center;
            color: var(--gray);
            font-size: 14px;
            font-family: monospace;
            flex-shrink: 0;
        }

        .playing .song-index {
            color: var(--primary);
            font-weight: bold;
        }

        .song-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 15px;
            color: #ddd;
        }

        .del-btn {
            background: transparent;
            color: var(--gray);
            border-radius: 8px;
            font-size: 18px;
            opacity: 0.5;
            flex-shrink: 0;
            padding: 0;
            width: 30px;
            height: 30px;
        }

        .del-btn:hover {
            opacity: 1;
            color: var(--accent);
            background: rgba(255, 42, 95, 0.1);
        }

        #toast {
            position: fixed;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text);
            color: var(--bg);
            padding: 12px 24px;
            border-radius: 30px;
            transition: 0.4s;
            opacity: 0;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            z-index: 100;
            font-size: 14px;
            pointer-events: none;
            white-space: nowrap;
        }

        #toast.show {
            bottom: 30px;
            opacity: 1;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
                height: 100dvh;
                overflow: hidden;
            }

            #main {
                height: 100%;
                display: none;
                flex-direction: column;
                gap: 12px;
            }

            .header-bar {
                padding: 12px 16px;
                margin-bottom: 0;
            }

            #room-id-txt {
                font-size: 15px;
            }

            .copy-btn {
                padding: 8px 12px;
                font-size: 12px;
            }

            .content-body {
                flex-direction: column;
                flex: 1;
                overflow: hidden;
                gap: 12px;
                flex-wrap: nowrap;
            }

            .player-section {
                flex: none;
                min-width: 100%;
                gap: 12px;
            }

            .input-row {
                gap: 8px;
            }

            #add-btn {
                width: 78px;
                padding-left: 10px;
                padding-right: 10px;
                white-space: nowrap;
            }

            #yt-link {
                min-width: 0;
            }

            .player-wrapper {
                border-radius: 12px;
            }

            .controls-row {
                justify-content: space-between;
            }

            #skip-btn {
                width: 100%;
                text-align: center;
            }

            .queue-section {
                flex: 1;
                position: static;
                max-height: none;
                min-width: 100%;
                overflow: hidden;
            }

            ul#playlist {
                overflow-y: auto;
                padding-bottom: 20px;
            }

            li {
                padding: 14px 16px;
            }

            .song-title {
                font-size: 14px;
            }

            #toast {
                max-width: calc(100vw - 32px);
                white-space: normal;
                text-align: center;
            }
        }
    </style>
</head>

<body>

<div id="toast"></div>

<div id="lobby" class="glass-card">
    <h1>Share Song</h1>
    <p style="color: var(--gray); font-size: 14px; margin: 0;">輸入房間代碼</p>

    <div class="room-input-wrapper">
        <input type="text" id="room-input" placeholder="例如: 888" autocomplete="off" maxlength="10">
        <button id="enter-btn" class="btn-primary">進入房間</button>
    </div>
</div>

<div id="main">
    <div class="header-bar glass-card">
        <span id="room-id-txt">ROOM: ----</span>
        <button class="copy-btn" onclick="copyLink()">複製連結</button>
    </div>

    <div class="content-body">
        <div class="player-section">
            <div class="input-row">
                <input type="text" id="yt-link" placeholder="貼上 YouTube 網址..." autocomplete="off">
                <button id="add-btn" class="btn-primary">➕ 加入</button>
            </div>

            <div class="player-wrapper">
                <div id="player"></div>
            </div>

            <button id="force-play" class="glass-card">▶ 點擊啟動播放器</button>

            <div class="controls-row">
                <button id="skip-btn">跳過此曲 ⏭</button>
            </div>
        </div>

        <div class="queue-section glass-card">
            <h4 class="queue-title">清單</h4>
            <ul id="playlist"></ul>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const app = initializeApp({
        apiKey: "AIzaSyAFYLj9wdQWuKtTmGdhO1trjUNRCSHNe3I",
        authDomain: "karaoke-fcaef.firebaseapp.com",
        databaseURL: "https://karaoke-fcaef-default-rtdb.firebaseio.com",
        projectId: "karaoke-fcaef"
    });

    const db = getDatabase(app);

    const state = {
        queue: [],
        currentKey: null,
        isPlayerReady: false
    };

    let player = null;
    let queueRef = null;

    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('room');

    const toast = (msg) => {
        const el = document.getElementById("toast");
        if (!el) return;

        el.textContent = msg;
        el.classList.add("show");

        clearTimeout(el._timer);
        el._timer = setTimeout(() => {
            el.classList.remove("show");
        }, 2500);
    };

    window.copyLink = () => {
        navigator.clipboard.writeText(window.location.href)
            .then(() => {
                toast("連結已複製");
            })
            .catch(() => {
                toast("複製失敗，請手動複製網址");
            });
    };

    function clearPlayerScreen() {
        state.currentKey = null;

        const forceBtn = document.getElementById('force-play');
        if (forceBtn) {
            forceBtn.style.display = 'none';
        }

        if (!player) return;

        try {
            if (player.stopVideo) {
                player.stopVideo();
            }

            if (player.clearVideo) {
                player.clearVideo();
            }
        } catch (error) {
            console.error("清除播放器畫面失敗:", error);
        }
    }

    function checkPlayer() {
        if (!state.isPlayerReady || !player) return;

        if (state.queue.length > 0) {
            const nextSong = state.queue[0];

            if (!nextSong || !nextSong.videoId) {
                return;
            }

            if (state.currentKey !== nextSong.key) {
                state.currentKey = nextSong.key;

                try {
                    player.loadVideoById(nextSong.videoId);
                    player.playVideo();
                } catch (error) {
                    console.error("載入影片失敗:", error);
                    toast("影片載入失敗");
                }
            }
        } else {
            clearPlayerScreen();
        }
    }

    function render() {
        const list = document.getElementById('playlist');
        list.innerHTML = '';

        if (state.queue.length === 0) {
            const emptyLi = document.createElement('li');
            emptyLi.textContent = '清單空空的，快去複製 YouTube 連結加入！';
            emptyLi.style.color = 'var(--gray)';
            emptyLi.style.justifyContent = 'center';
            emptyLi.style.padding = '40px';
            emptyLi.style.fontSize = '14px';
            emptyLi.style.textAlign = 'center';

            list.appendChild(emptyLi);
            clearPlayerScreen();
            return;
        }

        state.queue.forEach((song, i) => {
            const li = document.createElement('li');
            const isPlaying = i === 0;

            if (isPlaying) {
                li.className = 'playing';
            }

            const songInfo = document.createElement('div');
            songInfo.className = 'song-info';

            const songIndex = document.createElement('div');
            songIndex.className = 'song-index';
            songIndex.textContent = isPlaying ? '▶' : String(i + 1);

            const songTitle = document.createElement('div');
            songTitle.className = 'song-title';
            songTitle.textContent = song.title || 'YouTube Video';
            songTitle.title = song.title || 'YouTube Video';

            const delBtn = document.createElement('button');
            delBtn.className = 'del-btn';
            delBtn.dataset.key = song.key;
            delBtn.title = '移除';
            delBtn.textContent = '×';

            delBtn.onclick = () => {
                remove(ref(db, `rooms/${roomId}/queue/${song.key}`))
                    .then(() => {
                        toast("已移除歌曲");
                    })
                    .catch((error) => {
                        toast("移除失敗，請檢查 Firebase 權限設定");
                        console.error(error);
                    });
            };

            songInfo.appendChild(songIndex);
            songInfo.appendChild(songTitle);

            li.appendChild(songInfo);
            li.appendChild(delBtn);

            list.appendChild(li);
        });

        checkPlayer();
    }

    const getId = (url) => {
        const match = url.match(
            /(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|shorts\/|watch\?v=|watch\?.+&v=))([^&?/]+)/
        );

        return match ? match[1] : null;
    };

    const addSong = () => {
        if (!queueRef) {
            toast("請先進入房間");
            return;
        }

        const urlInput = document.getElementById('yt-link');
        const url = urlInput.value.trim();
        const vid = getId(url);

        if (!url) {
            toast("請貼上 YouTube 網址");
            return;
        }

        if (!vid) {
            toast("無效的 YouTube 網址");
            return;
        }

        const newSongRef = push(queueRef, {
            videoId: vid,
            title: "Loading...",
            timestamp: Date.now()
        });

        const songKey = newSongRef.key;

        newSongRef
            .then(() => {
                urlInput.value = '';
                toast("已加入清單");

                fetch(`https://noembed.com/embed?dataType=json&url=https://www.youtube.com/watch?v=${vid}`)
                    .then(r => r.json())
                    .then(d => {
                        const title = d.title || `YouTube Video - ${vid}`;
                        update(ref(db, `rooms/${roomId}/queue/${songKey}`), { title });
                    })
                    .catch(error => {
                        console.error("抓取標題失敗:", error);
                        update(ref(db, `rooms/${roomId}/queue/${songKey}`), {
                            title: `YouTube Video - ${vid}`
                        });
                    });
            })
            .catch(error => {
                toast("加入失敗，請稍後再試");
                console.error(error);
            });
    };

    function initLobbyMode() {
        document.getElementById('lobby').style.display = 'flex';
        document.getElementById('main').style.display = 'none';

        const roomInput = document.getElementById('room-input');
        const enterBtn = document.getElementById('enter-btn');

        const enterRoom = () => {
            const val = roomInput.value.trim();

            if (!val) {
                toast("請輸入代碼");
                return;
            }

            window.location.href = `?room=${encodeURIComponent(val)}`;
        };

        enterBtn.onclick = enterRoom;

        roomInput.onkeypress = (e) => {
            if (e.key === 'Enter') {
                enterRoom();
            }
        };

        roomInput.focus();
    }

    function initRoomMode() {
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('main').style.display = 'flex';
        document.getElementById('room-id-txt').textContent = `ROOM: ${roomId}`;

        queueRef = ref(db, `rooms/${roomId}/queue`);

        onValue(queueRef, (snapshot) => {
            const songs = [];

            snapshot.forEach(child => {
                songs.push({
                    key: child.key,
                    ...child.val()
                });
            });

            state.queue = songs.sort((a, b) => {
                return (a.timestamp || 0) - (b.timestamp || 0);
            });

            render();
        }, (error) => {
            toast("資料庫連線失敗，請檢查 Firebase 權限設定");
            console.error(error);
        });

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";

        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        window.onYouTubeIframeAPIReady = () => {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                playerVars: {
                    autoplay: 1,
                    controls: 1,
                    playsinline: 1,
                    rel: 0,
                    modestbranding: 1
                },
                events: {
                    onReady: () => {
                        state.isPlayerReady = true;
                        render();
                    },

                    onStateChange: (e) => {
                        const forceBtn = document.getElementById('force-play');

                        if (e.data === YT.PlayerState.ENDED && state.currentKey) {
                            remove(ref(db, `rooms/${roomId}/queue/${state.currentKey}`))
                                .catch(error => {
                                    toast("自動切歌失敗");
                                    console.error(error);
                                });
                        }

                        if (e.data === YT.PlayerState.UNSTARTED && state.queue.length > 0) {
                            forceBtn.style.display = 'block';
                        } else if (e.data === YT.PlayerState.PLAYING) {
                            forceBtn.style.display = 'none';
                        }
                    },

                    onError: (e) => {
                        console.error("播放器發生錯誤:", e.data);
                        toast("此影片無法播放，準備跳過");

                        setTimeout(() => {
                            if (state.currentKey) {
                                remove(ref(db, `rooms/${roomId}/queue/${state.currentKey}`))
                                    .catch(error => {
                                        toast("跳過失敗，請稍後再試");
                                        console.error(error);
                                    });
                            }
                        }, 1600);
                    }
                }
            });
        };
    }

    document.getElementById('add-btn').onclick = addSong;

    document.getElementById('yt-link').onkeypress = (e) => {
        if (e.key === 'Enter') {
            addSong();
        }
    };

    document.getElementById('skip-btn').onclick = () => {
        if (state.queue.length === 0) {
            toast("目前沒有歌曲可以跳過");
            return;
        }

        const keyToRemove = state.currentKey || state.queue[0]?.key;

        if (!keyToRemove) {
            toast("目前沒有歌曲可以跳過");
            return;
        }

        remove(ref(db, `rooms/${roomId}/queue/${keyToRemove}`))
            .then(() => {
                toast("已跳過目前歌曲");

                if (state.queue.length <= 1) {
                    clearPlayerScreen();
                }
            })
            .catch(error => {
                toast("跳過失敗，請稍後再試");
                console.error(error);
            });
    };

    document.getElementById('force-play').onclick = () => {
        if (!player || !player.playVideo) {
            toast("播放器尚未準備好");
            return;
        }

        try {
            player.playVideo();
            document.getElementById('force-play').style.display = 'none';
        } catch (error) {
            toast("播放器啟動失敗");
            console.error(error);
        }
    };

    if (!roomId) {
        initLobbyMode();
    } else {
        initRoomMode();
    }
</script>

</body>
</html>
